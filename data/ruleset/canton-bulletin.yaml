id: canton-bulletin
title: Example drought bulletin template
description: |
  Weekly bulletin per drought region. Uses the recommended terminology from the
  BAFU/MeteoSchweiz reference document (U8YQGX7S.pdf).
  Rule: the terms "Trockenheit" / "trocken" are reserved for the lead block and
  the CDI description. For the contributing factors (precipitation, surface/ground
  water, soil moisture) use the "deficit" terminology instead.

context:
  scope: canton
  required_inputs:
    canton_id: "BFS canton ID (e.g. 2 for Bern)"

# ---------------------------------------------------------------------------
# External data sources.
# Resolved per region at render time and exposed to sections under their key
# (e.g. {{ warnkarte.warnlevel }}).
# ---------------------------------------------------------------------------
data_sources:

  warnkarte:
    type: rest_api
    provider: "BAFU"
    title: "Drought warning map"
    url: "https://api3.geo.admin.ch/rest/services/api/MapServer/ch.bafu.trockenheitswarnkarte/{drought_region_id}"
    response_path: "feature.attributes"
    fields:
      warnlevel: "warnlevel"       # 1-5, matches the BAFU "Gefahrenstufe" scale
      info_de:   "info_de"         # plain-text label, e.g. "Mässige Gefahr"
      info_fr:   "info_fr"
      info_it:   "info_it"
      valid_from: "valid_from"
    description: |
      Returns the current, official danger level per region (idn = drought_region_id).
      Single source of truth for the action recommendations — do not derive from CSV.

  trockenheitsdaten_numerisch:
    type: stac_collection
    provider: "BAFU"
    title: "Drought data (numeric)"
    landing_page: "https://data.geo.admin.ch/browser/index.html#/collections/ch.bafu.trockenheitsdaten-numerisch"
    description: |
      Time series of all variables shown on the BAFU drought platform: precipitation
      sums and SPI, soil moisture, hydro index, CDI, etc., broken down by drought
      region and measurement station.
    datasets_used:
      - weekly_current_regions       # current indices & sums per region
      - weekly_forecast_regions      # weekly forecast (p10/p50/p90) per region
      - monthly_historic_regions     # long-term comparison (from 1991)
      - daily_reference_stations     # reference thresholds per station and day of year
      - weekly_current_stations      # current station measurements (discharge / water level)
      - regions                      # region master data (drought_region_id ↔ name)
      - stations                     # station master data

# ---------------------------------------------------------------------------
# External references (for the source list in the report).
# ---------------------------------------------------------------------------
references:
  terminologie_bafu:
    title: "Recommended terminology for drought bulletins"
    url: "https://s3.govtech.digisus-lab.ch/govtech/uploads/14/L2SYQ/U8YQGX7S.pdf"
    provider: "BAFU / MeteoSchweiz"
  handlungsempfehlungen_bafu:
    title: "Drought warnings and behavioural recommendations"
    url: "https://www.trockenheit.admin.ch/de/trockenheit/trockenheitswarnungen-und-verhaltensempfehlungen"
    provider: "BAFU"

# ---------------------------------------------------------------------------
# Banner links rendered as a link row directly under the title.
# ---------------------------------------------------------------------------
banner:
  - label: { de: "Trockenheitsportal", fr: "Portail sécheresse" }
    url: "https://www.trockenheit.admin.ch"
  - label: { de: "Waldbrandgefahr", fr: "Danger d'incendie de forêt" }
    url: "https://www.waldbrandgefahr.ch"
  - label: { de: "Naturgefahrenportal", fr: "Portail des dangers naturels" }
    url: "https://www.naturgefahren.ch"

# ---------------------------------------------------------------------------
# Further reading links, rendered after the Allgemeine Lage section.
# `url` may be a plain string or a map keyed by BFS canton ID (canton-specific).
# ---------------------------------------------------------------------------
weiterfuehrende_links:
  - label: { de: "Grundwasserdaten Kanton Bern", fr: "Données des eaux souterraines canton de Berne" }
    url:
      2: "https://www.bvd.be.ch/de/start/themen/wasser/hydrologische-daten/regionale-grundwasserauswertung.html"
  - label: { de: "Vegetationszustand (VHI)", fr: "État de la végétation (VHI)" }
    url: "https://www.trockenheit.admin.ch/de/faktoren/vegetation/vegetationszustand-vhi"

# ---------------------------------------------------------------------------
# Nomenclature: maps an index level (1-5) to a localized text snippet.
# The `field` / `fields` keys point to columns in weekly_current_regions /
# monthly_current_regions / weekly_forecast_regions.
# ---------------------------------------------------------------------------
nomenclature:

  cdi:
    field: cdi
    scope: "Use only in the lead block and in the CDI description."
    adjective:
      1: { de: "nicht trocken",   fr: "pas sec",          it: "non secco" }
      2: { de: "leicht trocken",  fr: "légèrement sec",   it: "leggeremente secco" }
      3: { de: "trocken",         fr: "sec",              it: "secco" }
      4: { de: "sehr trocken",    fr: "très sec",         it: "molto secco" }
      5: { de: "extrem trocken",  fr: "extrêmement sec",  it: "estremamente secco" }
    noun:
      1: { de: "keine Trockenheit",       fr: "pas de sécheresse",   it: "nessuna siccità" }
      2: { de: "leichte Trockenheit",     fr: "sécheresse légère",   it: "siccità leggera" }
      3: { de: "erhebliche Trockenheit",  fr: "sécheresse modérée",  it: "siccità moderata" }
      4: { de: "grosse Trockenheit",      fr: "sécheresse élevée",   it: "siccità elevata" }
      5: { de: "extreme Trockenheit",     fr: "sécheresse extrême",  it: "siccità estrema" }
    # Range / single composition used by the deficit_range() renderer helper.
    # Parts come from `adjective`; e.g. "leicht trocken bis sehr trocken".
    range:  { de: "{min} bis {max}", fr: "{min} à {max}", it: "{min} a {max}" }
    single: { de: "{val}",           fr: "{val}",         it: "{val}" }

  niederschlag:
    fields: [precip_1m_index, precip_3m_index, precip_24m_index]
    noun:
      1: { de: "kein oder geringes Niederschlagsdefizit", fr: "pas de déficit pluviométrique",      it: "deficit di precipitazioni nullo o trascurabile" }
      2: { de: "ein leichtes Niederschlagsdefizit",           fr: "léger déficit pluviométrique",       it: "leggero deficit di precipitazioni" }
      3: { de: "ein erhebliches Niederschlagsdefizit",        fr: "déficit pluviométrique modéré",      it: "notevole deficit di precipitazioni" }
      4: { de: "ein grosses Niederschlagsdefizit",            fr: "déficit pluviométrique élevé",       it: "grande deficit di precipitazioni" }
      5: { de: "ein extremes Niederschlagsdefizit",           fr: "déficit pluviométrique extrême",     it: "estremo deficit di precipitazioni" }
    # Bare adjectives + composition templates for the deficit_range() helper,
    # e.g. "ein leichtes bis grosses Niederschlagsdefizit".
    adjective:
      1: { de: "geringes",    fr: "faible",   it: "scarso" }
      2: { de: "leichtes",    fr: "léger",    it: "leggero" }
      3: { de: "erhebliches", fr: "modéré",   it: "notevole" }
      4: { de: "grosses",     fr: "élevé",    it: "grande" }
      5: { de: "extremes",    fr: "extrême",  it: "estremo" }
    range:  { de: "ein {min} bis {max} Niederschlagsdefizit", fr: "un déficit pluviométrique {min} à {max}", it: "un deficit di precipitazioni {min} a {max}" }
    single: { de: "ein {val} Niederschlagsdefizit",           fr: "un déficit pluviométrique {val}",         it: "un deficit di precipitazioni {val}" }

  hydro:
    field: hydro_index
    note: "For groundwater, do not use the '-defizit' wording."
    adjective:
      1: { de: "—",                                       fr: "—",                                   it: "—" }
      2: { de: "leicht niedrige Abflüsse/Wasserstände",   fr: "niveaux d'eau légèrement bas",        it: "livelli dell'acqua/portata leggermente bassi" }
      3: { de: "niedrige Abflüsse/Wasserstände",          fr: "niveaux d'eau bas",                   it: "livelli d'acqua/portata bassi" }
      4: { de: "sehr niedrige Abflüsse/Wasserstände",     fr: "niveaux d'eau très bas",              it: "livelli d'acqua/portata molto bassi" }
      5: { de: "extrem niedrige Abflüsse/Wasserstände",   fr: "niveaux d'eau extrêmement bas",       it: "livelli dell'acqua/portata estremamente bassi" }
    noun:
      1: { de: "kein oder geringes Abflussdefizit",       fr: "pas de déficit d'écoulement",         it: "nessun o scarso deficit di portata" }
      2: { de: "ein leichtes Abflussdefizit",                 fr: "léger déficit d'écoulement",          it: "leggero deficit di portata" }
      3: { de: "ein erhebliches Abflussdefizit",              fr: "déficit d'écoulement modéré",         it: "notevole deficit di portata" }
      4: { de: "ein grosses Abflussdefizit",                  fr: "déficit d'écoulement élevé",          it: "grande deficit di portata" }
      5: { de: "ein extremes Abflussdefizit",                 fr: "déficit d'écoulement extrême",        it: "deficit di portata estremo" }

  bodenfeuchte:
    field: soil_moisture_index
    noun:
      1: { de: "kein oder geringes Bodenfeuchtedefizit",  fr: "pas de déficit d'humidité du sol",    it: "nessun o scarso deficit di umidità del suolo" }
      2: { de: "ein leichtes Bodenfeuchtedefizit",            fr: "léger déficit d'humidité du sol",     it: "leggero deficit di umidità del suolo" }
      3: { de: "ein erhebliches Bodenfeuchtedefizit",         fr: "déficit d'humidité du sol modéré",    it: "notevole deficit di umidità del suolo" }
      4: { de: "ein grosses Bodenfeuchtedefizit",             fr: "déficit d'humidité du sol élevé",     it: "grande deficit di umidità del suolo" }
      5: { de: "ein extremes Bodenfeuchtedefizit",            fr: "déficit d'humidité du sol extrême",   it: "estremo deficit di umidità del suolo" }

  vhi:
    field: vhi_index
    # Stress level nouns for the vegetation health sentence.
    # Maps to the official SwissEO VHI classes (see config/rules.yaml → vhi.thresholds).
    # Levels 1 merges "Normal / Good / Excellent" (VHI >= 40); levels 2–5 are the four stress classes.
    noun:
      1: { de: "kein erhöhtes Stressniveau",          fr: "aucun stress végétatif élevé",        it: "nessun livello di stress elevato" }
      2: { de: "ein leicht erhöhtes Stressniveau",    fr: "un stress végétatif légèrement élevé", it: "un livello di stress leggermente elevato" }
      3: { de: "ein erhöhtes Stressniveau",           fr: "un stress végétatif modéré",           it: "un livello di stress moderato" }
      4: { de: "ein stark erhöhtes Stressniveau",     fr: "un stress végétatif élevé",            it: "un livello di stress elevato" }
      5: { de: "ein extremes Stressniveau",           fr: "un stress végétatif extrême",          it: "un livello di stress estremo" }

# ---------------------------------------------------------------------------
# Reusable trend logic. Typically compares the forecast (p50) against the
# current value. Since the index runs from "1 = no deficit ... 5 = extreme",
# an increase of the level means the deficit is getting worse.
# ---------------------------------------------------------------------------
trend:
  defizit:
    rule: "delta = forecast - current"
    stable_tolerance: 0          # |delta| <= tolerance -> stable
    # Pure infinitives, so all variants fit the same sentence slot.
    # Usage: "Das <Subjekt> wird ... voraussichtlich {{ trend.defizit.X.de }}."
    increase: { de: "zunehmen",            fr: "augmenter",     it: "aumentare" }
    decrease: { de: "abnehmen",            fr: "diminuer",      it: "diminuire" }
    stable:   { de: "unverändert bleiben", fr: "rester stable", it: "rimanere stabile" }
  # Canton-level CDI outlook. delta = sum(forecast cdi) - sum(current cdi):
  # a rising CDI sum (delta > 0) means the situation deteriorates.
  # Values are full predicates so the sentence "Die Situation {{ ... }}." reads correctly.
  situation:
    rule: "delta = sum(forecast cdi) - sum(current cdi); >0 worsens"
    stable_tolerance: 0
    increase: { de: "wird sich voraussichtlich verschlechtern", fr: "devrait se détériorer",  it: "—" }
    decrease: { de: "wird sich voraussichtlich verbessern",     fr: "devrait s'améliorer",    it: "—" }
    stable:   { de: "wird voraussichtlich unverändert bleiben", fr: "devrait rester stable",  it: "—" }

# ---------------------------------------------------------------------------
# Action recommendations per BAFU Gefahrenstufe (CDI 1-5).
# Source: https://www.trockenheit.admin.ch/de/trockenheit/trockenheitswarnungen-und-verhaltensempfehlungen
# Note: BAFU does not publish dedicated recommendations for levels 3 and 5 —
# these fall back to the next lower level (3 -> 2, 5 -> 4).
# ---------------------------------------------------------------------------
handlungsempfehlungen:
  source_ref: references.handlungsempfehlungen_bafu
  by_gefahrenstufe:
    1:
      empfehlungen:
        de:
          - "Es sind keine besonderen Massnahmen zur Vorbeugung von Trockenheit erforderlich."
        fr:
          - "Aucune mesure particulière n'est nécessaire pour prévenir la sécheresse."
    2:
      empfehlungen:
        de:
          - "Informieren Sie sich auf www.trockenheit.ch über die aktuelle Lage in Ihrer Region."
          - "Informieren Sie sich über mögliche Einschränkungen der Wassernutzung."
          - "Gehen Sie sparsam mit den Wasserressourcen um."
        fr:
          - "Informez-vous sur www.trockenheit.ch sur la situation actuelle dans votre région."
          - "Informez-vous sur les éventuelles restrictions d'utilisation de l'eau."
          - "Utilisez les ressources en eau avec parcimonie."
    3:
      fallback: 2
    4:
      empfehlungen:
        de:
          - "Informieren Sie sich über mögliche Anweisungen der lokalen Behörden betreffend Verbote und Einschränkungen der Wassernutzung und beachten Sie diese."
          - "Gehen Sie sparsam mit den Wasserressourcen um."
          - "Halten Sie sich an die Anweisungen und Verbote der lokalen Behörden bezüglich Waldbrandgefahr."
        fr:
          - "Informez-vous sur les éventuelles consignes des autorités locales concernant les interdictions et restrictions d'utilisation de l'eau et respectez-les."
          - "Utilisez les ressources en eau avec parcimonie."
          - "Respectez les consignes et interdictions des autorités locales concernant les risques d'incendie de forêt."
    5:
      fallback: 4

# ---------------------------------------------------------------------------
# Lead block: current warning level as a coloured box directly below the title.
# Visually analogous to the BAFU drought platform
# (e.g. https://www.trockenheit.admin.ch/de/regionen/31-oestlicher-jura/aktuelle-lage).
# ---------------------------------------------------------------------------
lead:
  warnstufe:
    headline:
      de: "{{ canton.max_warnlevel_info_de }}, Stufe {{ canton.max_warnlevel }}"
      fr: "{{ canton.max_warnlevel_info_fr }}, niveau {{ canton.max_warnlevel }}"
    meta:
      de: "Gültig ab {{ format_date(canton.data_timestamp, 'DD.MM.YYYY') }}"
      fr: "Valable à partir du {{ format_date(canton.data_timestamp, 'DD.MM.YYYY') }}"
    farben_pro_stufe:
      1: { hintergrund: "#6bbd50", text: "#ffffff", label: "grün" }
      2: { hintergrund: "#f7e84c", text: "#1a1a1a", label: "gelb" }
      3: { hintergrund: "#ff8c00", text: "#ffffff", label: "orange" }
      4: { hintergrund: "#e02020", text: "#ffffff", label: "rot" }
      5: { hintergrund: "#8b0000", text: "#ffffff", label: "dunkelrot" }
    maps:
      - id: cdi_current
        title: { de: "Aktueller CDI", fr: "CDI actuel" }
        source: "canton.regions[*].cdi"
        style: "choropleth_warnregionen"
      - id: cdi_forecast_week2
        title: { de: "CDI-Prognose Woche 2", fr: "Prévision CDI semaine 2" }
        source: "canton.regions[*].cdi_forecast_week2"
        style: "choropleth_warnregionen"

# ---------------------------------------------------------------------------
# Report sections. Placeholders in {{ ... }} are resolved at render time.
# Supported expressions:
#   - {{ dataset.column }}                            raw value from CSV / API response
#   - {{ resolved_entity.field }}                     e.g. region.name_de (see join in placeholders)
#   - {{ nomenclature.<key>.<form>[<value>].<lang> }} text snippet by index level
#   - {{ trend(<expr>, "<key>").<lang> }}             trend term depending on the sign
#   - {{ format_date(<iso_date>, "<pattern>") }}      date formatting
#   - {{#each <collection> }} … {{ this.x }} {{/each}}  iteration (Handlebars-style)
# ---------------------------------------------------------------------------
sections:

  - id: allgemeine-lage
    title:
      de: "Allgemeine Lage"
      fr: "Situation générale"
    template:
      de: |
        Im Kanton {{ canton.canton_name_de }} sind aktuell {{ region_phrase(canton.n_regions_dry, canton.regions|length) }} trocken{{#if canton.cdi_min_dry}} ({{ deficit_range(canton.cdi_min_dry, canton.cdi_max_dry, "cdi") }}){{/if}}. Die Situation {{ trend(canton.cdi_situation_delta, "situation") }}.

        In den vergangenen 30 Tagen sind durchschnittlich rund {{ canton.mean_precip_sum_1m|round|int }} mm Niederschlag gefallen (3-Monats-Summe: {{ canton.mean_precip_sum_3m|round|int }} mm). Im langjährigen Vergleich bedeutet dies regional {{ deficit_range(canton.precip_index_min, canton.precip_index_max, "niederschlag") }}.

        {{#if canton.discharge.n_total}}{{ pct_stations(canton.discharge.pct_low)|ucfirst }} im Kanton weisen aktuell einen niedrigen Abfluss (7-Tages-Mittel) auf. Davon {{ plural(canton.discharge.n_very_low, "liegt", "liegen") }} {{ canton.discharge.n_very_low }} {{ plural(canton.discharge.n_very_low, "Station", "Stationen") }} im sehr niedrigen Bereich.{{/if}}{{#if not canton.discharge.n_total}}Im Kanton liegen keine Abflussmessstationen vor.{{/if}}

        Bei der Bodenfeuchte weisen {{ region_phrase(canton.n_regions_with_soil_moisture_deficit, canton.regions|length, "Warnregionen") }} ein Defizit auf.

        Der Vegetationszustand zeigt in {{ region_phrase(canton.n_regions_with_vhi_stress, canton.regions|length, "Warnregionen") }} {{ nomenclature.vhi.noun[canton.max_vhi_index].de }}.
      fr: |
        Dans le canton de {{ canton.canton_name_fr }}, {{ region_phrase(canton.n_regions_dry, canton.regions|length) }} sont actuellement en situation de sécheresse{{#if canton.cdi_min_dry}} ({{ deficit_range(canton.cdi_min_dry, canton.cdi_max_dry, "cdi") }}){{/if}}. La situation {{ trend(canton.cdi_situation_delta, "situation") }}.

        Au cours des 30 derniers jours, il est tombé en moyenne environ {{ canton.mean_precip_sum_1m|round|int }} mm de précipitations (cumul sur 3 mois : {{ canton.mean_precip_sum_3m|round|int }} mm). En comparaison pluriannuelle, cela représente régionalement {{ deficit_range(canton.precip_index_min, canton.precip_index_max, "niederschlag") }}.

        {{#if canton.discharge.n_total}}{{ pct_stations(canton.discharge.pct_low)|ucfirst }} du canton présentent actuellement un débit faible (moyenne sur 7 jours). Parmi elles, {{ canton.discharge.n_very_low }} {{ plural(canton.discharge.n_very_low, "station se situe", "stations se situent") }} dans la plage très basse.{{/if}}{{#if not canton.discharge.n_total}}Le canton ne dispose d'aucune station de mesure du débit.{{/if}}

        Concernant l'humidité du sol, {{ region_phrase(canton.n_regions_with_soil_moisture_deficit, canton.regions|length) }} présentent un déficit.

        L'état de la végétation indique {{ nomenclature.vhi.noun[canton.max_vhi_index].fr }} dans {{ region_phrase(canton.n_regions_with_vhi_stress, canton.regions|length, "Warnregionen", "régions d'alerte") }}.
    placeholders:
      - id: precip_index_summary
        source: canton.n_regions_by_precip_index
      - id: soil_moisture_summary
        source: canton.n_regions_by_soil_moisture_index
      - id: max_warnlevel_summary
        source: canton.max_warnlevel

  - id: regionen
    title:
      de: "Allgemeine Lage nach Regionen"
      fr: "Situation par région"
    template:
      de: |
        {{#each canton.regions}}
        ### {{ this.region_name_de }}

        In den vergangenen 30 Tagen sind in der Region {{ this.region_name_de }} rund {{ this.precip_sum_1m|round|int }} mm Niederschlag gefallen (3-Monats-Summe: {{ this.precip_sum_3m|round|int }} mm). Die Region weist damit aktuell {{ nomenclature.niederschlag.noun[this.precip_1m_index].de }} auf. Das Defizit wird in nächster Zeit tendenziell {{ trend(this.precip_deficit_delta, "defizit") }}.

        {{#if this.discharge.n_total}}{{ pct_stations(this.discharge.pct_low)|ucfirst }} weisen aktuell einen niedrigen Abfluss (7-Tages-Mittel) auf. Davon {{ plural(this.discharge.n_very_low, "liegt", "liegen") }} {{ this.discharge.n_very_low }} {{ plural(this.discharge.n_very_low, "Station", "Stationen") }} im sehr niedrigen Bereich.{{/if}}{{#if not this.discharge.n_total}}In dieser Region liegen keine Abflussmessstationen vor.{{/if}}

        Es besteht zurzeit {{ nomenclature.bodenfeuchte.noun[this.soil_moisture_index].de }}. Das Defizit wird in nächster Zeit tendenziell {{ trend(this.soil_moisture_deficit_delta, "defizit") }}.

        Der Vegetationszustand zeigt {{ nomenclature.vhi.noun[this.vhi_index].de }}.

        {{/each}}
      fr: |
        {{#each canton.regions}}
        ### {{ this.region_name_de }}

        Au cours des 30 derniers jours, environ {{ this.precip_sum_1m|round|int }} mm de précipitations sont tombés dans la région {{ this.region_name_de }} (cumul sur 3 mois : {{ this.precip_sum_3m|round|int }} mm). La région présente actuellement {{ nomenclature.niederschlag.noun[this.precip_1m_index].fr }}. Le déficit va probablement {{ trend(this.precip_deficit_delta, "defizit") }} prochainement.

        {{#if this.discharge.n_total}}{{ pct_stations(this.discharge.pct_low)|ucfirst }} présentent actuellement un débit faible (moyenne sur 7 jours). Parmi elles, {{ this.discharge.n_very_low }} {{ plural(this.discharge.n_very_low, "station se situe", "stations se situent") }} dans la plage très basse.{{/if}}{{#if not this.discharge.n_total}}Cette région ne dispose d'aucune station de mesure du débit.{{/if}}

        Concernant l'humidité du sol, il y a actuellement {{ nomenclature.bodenfeuchte.noun[this.soil_moisture_index].fr }}. Le déficit va probablement {{ trend(this.soil_moisture_deficit_delta, "defizit") }} prochainement.

        L'état de la végétation indique {{ nomenclature.vhi.noun[this.vhi_index].fr }}.

        {{/each}}
    placeholders:
      - id: region_loop
        source: canton.regions
        description: "Iterate over each region in the canton, render per-region paragraph."

  - id: handlungsoptionen
    title:
      de: "Handlungsoptionen"
      fr: "Options d'action"
    template:
      de: |
        {{#each handlungsempfehlungen.by_gefahrenstufe[canton.max_warnlevel].empfehlungen.de}}
        - {{ this }}
        {{/each}}
      fr: |
        {{#each handlungsempfehlungen.by_gefahrenstufe[canton.max_warnlevel].empfehlungen.fr}}
        - {{ this }}
        {{/each}}
    placeholders:
      - id: max_warnlevel
        source: canton.max_warnlevel
        resolver: handlungsempfehlungen.by_gefahrenstufe
        fallback_rule: "If recommendations missing for a level, follow .fallback chain (3 → 2, 5 → 4)."

  - id: datenquellen
    title: { de: "Datenquellen", fr: "Sources de données", it: "Fonti dei dati" }
    locale: de
    template: |
      {{#each data_sources}}
      - {{ this.title }} ({{ this.provider }}) — {{ this.landing_page or this.url }}
      {{/each}}
      {{#each references}}
      - {{ this.title }} ({{ this.provider }}) — {{ this.url }}
      {{/each}}
    placeholders:
      - id: datenquellen_liste
        source: data_sources
        description: "All external data sources declared in data_sources, rendered as title + provider + URL."
      - id: referenzen_liste
        source: references
        description: "All external documents declared in references (terminology, recommendations etc.)."
    notes:
      - "The section automatically renders every top-level entry in data_sources and references."
      - "No local file paths — web links only (landing_page for STAC collections, url for APIs / documents)."
