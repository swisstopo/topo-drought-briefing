name: Change a threshold or rule value
description: Request a change to a drought warning threshold, index level boundary, or classification rule.
title: "[THRESHOLD] "
labels: ["threshold", "ruleset"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        **No coding needed — just fill in the fields below.**
        The thresholds live in `data/ruleset/canton-bulletin.yaml`. You can find the current values there or on the published website.

  - type: dropdown
    id: indicator
    attributes:
      label: Which indicator does this affect?
      description: Choose the drought indicator whose threshold you want to change.
      options:
        - CDI (Combined Drought Indicator)
        - SPI (Precipitation index)
        - Soil moisture
        - Hydro / discharge
        - Vegetation (VHI)
        - Other (explain below)
    validations:
      required: true

  - type: dropdown
    id: warning_level
    attributes:
      label: Which warning level?
      options:
        - Level 1 (normal)
        - Level 2 (early warning)
        - Level 3 (warning)
        - Level 4 (strong warning)
        - Level 5 (very strong warning)
        - All levels / not level-specific
    validations:
      required: true

  - type: input
    id: current_value
    attributes:
      label: Current threshold value
      description: Copy the current number from the YAML file or the website. Example — 0.3
      placeholder: e.g. 0.3
    validations:
      required: true

  - type: input
    id: new_value
    attributes:
      label: New threshold value you are requesting
      placeholder: e.g. 0.25
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this be changed?
      description: Explain the scientific or operational reason. A reference to a document or meeting decision is helpful.
      placeholder: "Example: The current threshold was defined in 2021. Updated analysis shows that 0.25 better matches observed drought conditions."
    validations:
      required: true

  - type: input
    id: approved_by
    attributes:
      label: Approved by (name / role)
      description: Who agreed that this change should be made? This helps us prioritise and verify.
      placeholder: "Example: Petra Muster, BAFU Hydrology"
    validations:
      required: false
