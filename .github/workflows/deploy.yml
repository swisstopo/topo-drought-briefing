name: Deploy to GitHub Pages

on:
  push:
    branches: [2-refactor-to-static-page]
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          # Sync all application files, stripping out repo metadata and dev environments
          rsync -arv --exclude='.git/' --exclude='.github/' --exclude='.venv/' --exclude='tests/' --exclude='scripts/' --exclude='stac_data/' ./ _site/
          
          # Move the stlite bootstrapper to the root directory for serving
          mv _site/docs/index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4