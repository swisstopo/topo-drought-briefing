name: INT Branch Preview

# Runs on every push to INT and can be triggered manually.
# Deploys the site to /int/ on GitHub Pages so it can be reviewed
# at swisstopo.github.io/topo-drought-briefing/int/ before merging to main.

on:
  push:
    branches:
      - INT
  workflow_dispatch:

permissions:
  contents: write

# INT runs can cancel each other — no risk of half-deploying production.
concurrency:
  group: pages-int
  cancel-in-progress: true

jobs:
  build-and-deploy-int:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout INT branch
        uses: actions/checkout@v4
        with:
          ref: INT

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      # -----------------------------------------------------------------------
      # Pipeline: download → aggregate → validate → generate site
      # -----------------------------------------------------------------------

      - name: Download raw datasets
        run: python scripts/download.py

      - name: Aggregate and evaluate
        run: python scripts/aggregate.py

      - name: Validate processed outputs
        run: python scripts/validate.py

      - name: Generate static site
        run: python scripts/generate_site.py

      # -----------------------------------------------------------------------
      # Publish to GitHub Pages at /int/ — does not touch the main site (/).
      # keep_files: true means only /int/ is updated; everything else stays.
      # -----------------------------------------------------------------------

      - name: Deploy INT preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: int
          keep_files: true
          commit_message: "deploy INT preview: ${{ github.sha }}"
